<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      width: 380px;
      min-height: 420px;
      background: #f5f7fa;
      color: #1a1a2e;
    }

    .header {
      background: linear-gradient(135deg, #1F4E79, #2e86c1);
      color: white;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; }
    .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .body { padding: 16px; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      display: block;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border: 1.5px solid #cdd6e0;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
      background: #fff;
      line-height: 1.6;
    }
    textarea:focus { border-color: #2e86c1; }
    textarea::placeholder { color: #aaa; }

    .options {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .options label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .options select {
      border: 1.5px solid #cdd6e0;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
      background: #fff;
    }

    .btn-start {
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: linear-gradient(135deg, #1F4E79, #2e86c1);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }
    .btn-start:hover { opacity: 0.9; }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-stop {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s;
    }
    .btn-stop:hover { opacity: 0.85; }

    .progress-box {
      margin-top: 14px;
      background: #fff;
      border: 1.5px solid #cdd6e0;
      border-radius: 8px;
      padding: 12px;
      display: none;
    }
    .progress-title {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .progress-bar-wrap {
      background: #e8eef4;
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #1F4E79, #2e86c1);
      border-radius: 20px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
    }
    .progress-text span { color: #1F4E79; font-weight: 600; }

    .log-box {
      margin-top: 10px;
      max-height: 100px;
      overflow-y: auto;
      background: #f0f4f8;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      color: #444;
      line-height: 1.6;
    }
    .log-box .log-item { border-bottom: 1px solid #e0e7ef; padding: 2px 0; }
    .log-box .log-item:last-child { border: none; }
    .log-box .ok { color: #1a7f37; }
    .log-box .err { color: #c0392b; }
    .log-box .info { color: #2e86c1; }

    .done-box {
      margin-top: 12px;
      background: #eafaf1;
      border: 1.5px solid #a9dfbf;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      display: none;
    }
    .done-box .done-icon { font-size: 24px; }
    .done-box p { font-size: 12px; color: #1a7f37; font-weight: 600; margin-top: 4px; }
    .done-box small { font-size: 11px; color: #555; }

    .header-actions {
      position: absolute;
      right: 16px;
      top: 16px;
      display: flex;
      gap: 6px;
    }
    .btn-header-icon {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-header-icon:hover { background: rgba(255, 255, 255, 0.3); }

    .stats-box {
      display: none;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      border: 1.5px solid #cdd6e0;
    }
    .stats-box.active { display: grid; }

    .stat-item {
      text-align: center;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      border: 1px solid #e0e7ef;
    }
    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: #1F4E79;
    }
    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      line-height: 1.3;
    }
    .stat-item.need-verify .stat-num { color: #f39c12; }
    .stat-item.valid .stat-num { color: #27ae60; }
    .stat-item.invalid .stat-num { color: #e74c3c; }
    .stat-item.progress .stat-num { color: #2e86c1; }

    .done-box .btn-export-session {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: #2e86c1;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .done-box .btn-export-session:hover { opacity: 0.85; }

    .settings-section {
      margin-top: 12px;
      border: 1.5px solid #cdd6e0;
      border-radius: 8px;
    }
    .settings-section summary {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      user-select: none;
    }
    .settings-section summary:hover { background: #f8f9fa; }
    .settings-body {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-top: 1.5px solid #cdd6e0;
    }
    .settings-body label {
      font-size: 11px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }
    .settings-body input {
      width: 100%;
      border: 1.5px solid #cdd6e0;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
      transition: border 0.2s;
    }
    .settings-body input:focus { border-color: #2e86c1; }
    .settings-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-save-config {
      flex: 1;
      padding: 7px;
      background: #1F4E79;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save-config:hover { opacity: 0.9; }
    .btn-test-config {
      flex: 1;
      padding: 7px;
      background: #e8f0fe;
      color: #1F4E79;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-test-config:hover { opacity: 0.85; }
    #configStatus {
      font-size: 11px;
      color: #27ae60;
      min-height: 16px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🛒 Amazon Product Scraper</h1>
    <p>Cào dữ liệu sản phẩm · Xuất Excel</p>
  </div>
  <div class="header-actions">
    <button class="btn-header-icon" id="btnDashboard" title="Xem Dashboard">📊</button>
  </div>
</div>

<div class="body">
  <label>Nhập Keywords (mỗi keyword 1 dòng)</label>
  <textarea id="keywords" placeholder="gifts for mom&#10;gifts for dad&#10;gifts for wife"></textarea>

  <div class="options">
    <label>
      Số trang/keyword:
      <select id="numPages">
        <option value="1">1 trang</option>
        <option value="2">2 trang</option>
        <option value="3" selected>3 trang (full)</option>
      </select>
    </label>
  </div>

  <button class="btn-start" id="btnStart">🚀 Bắt đầu cào dữ liệu</button>
  <button class="btn-stop" id="btnStop">⛔ Dừng lại</button>

  <div class="stats-box" id="statsBox">
    <div class="stat-item need-verify">
      <div class="stat-num" id="statTotalNum">0</div>
      <div class="stat-label">Cần<br/>Verify</div>
    </div>
    <div class="stat-item valid">
      <div class="stat-num" id="statValidNum">0</div>
      <div class="stat-label">Hợp<br/>lệ ✅</div>
    </div>
    <div class="stat-item invalid">
      <div class="stat-num" id="statInvalidNum">0</div>
      <div class="stat-label">Loại<br/>bỏ ❌</div>
    </div>
    <div class="stat-item progress">
      <div class="stat-num" id="statKwNum">0/0</div>
      <div class="stat-label">Keywords<br/>Progress</div>
    </div>
  </div>

  <div class="progress-box" id="progressBox">
    <div class="progress-title">⏳ Đang cào dữ liệu...</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">Đang khởi động...</div>
    <div class="log-box" id="logBox"></div>
  </div>

  <div class="done-box" id="doneBox">
    <div class="done-icon">✅</div>
    <p id="doneMsg">Hoàn tất!</p>
    <small id="doneDetail"></small>
    <br/>
    <button class="btn-export-session" id="btnExportSession">📥 Re-export Excel</button>
  </div>

  <details class="settings-section" id="supabaseSettings">
    <summary>⚙️ Supabase Settings (Sync Data to Cloud)</summary>
    <div class="settings-body">
      <label>Project URL</label>
      <input type="text" id="supabaseUrl" placeholder="https://xxxx.supabase.co">
      <label>Anon Key</label>
      <input type="password" id="supabaseKey" placeholder="eyJhbGci...">
      <div class="settings-actions">
        <button id="btnSaveConfig" class="btn-save-config">💾 Lưu</button>
        <button id="btnTestConfig" class="btn-test-config">🔌 Test kết nối</button>
      </div>
      <span id="configStatus"></span>
    </div>
  </details>
</div>

<script src="popup.js"></script>
</body>
</html>
